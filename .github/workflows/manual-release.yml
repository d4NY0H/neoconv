name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate requested version against repository files
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          python - <<'PY'
          import pathlib
          import re
          import tomllib
          import os
          import sys

          version = os.environ["VERSION"].strip()
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
            print(f"Invalid version format: {version} (expected x.y.z)")
            sys.exit(1)

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          project_version = pyproject["project"]["version"]

          init_text = pathlib.Path("neoconv/__init__.py").read_text()
          m = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)
          if not m:
            print("Could not find __version__ in neoconv/__init__.py")
            sys.exit(1)
          init_version = m.group(1)

          if project_version != version or init_version != version:
            print("Version mismatch detected:")
            print(f"  workflow input   : {version}")
            print(f"  pyproject.toml   : {project_version}")
            print(f"  neoconv/__init__.py: {init_version}")
            sys.exit(1)
          print(f"Version check passed: {version}")
          PY

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Create and push tag
        env:
          TAG: ${{ github.event.inputs.version }}
        run: |
          git rev-parse "$TAG" >/dev/null 2>&1 && {
            echo "Tag '$TAG' already exists."
            exit 1
          }
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          draft: true
          prerelease: false
          files: |
            dist/*
